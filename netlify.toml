# Netlify config (Cloudflare Pages works the same with no build step).
[build]
  publish = "."
  command = ""

# Pretty 404s and security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
